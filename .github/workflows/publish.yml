name: Publish to NuGet

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'
      - run: dotnet restore Csharp-Sdk.csproj
      - run: dotnet build Csharp-Sdk.csproj --configuration Release --no-restore
      - run: dotnet pack Csharp-Sdk.csproj --configuration Release --no-build
      - run: dotnet nuget push bin/Release/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://api.nuget.org/v3/index.json --skip-duplicate
